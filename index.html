<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра с флажками</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем библиотеку для конфетти -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Стили для красивой горизонтальной прокрутки на мобильных */
        .custom-scrollbar::-webkit-scrollbar {
            height: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin: 0 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        /* Улучшенное позиционирование веревки для любых экранов */
        .rope-visual {
            position: absolute;
            /* Центрируем веревку и заставляем её тянуться от края до края экрана (или скролла) */
            left: 50%;
            transform: translateX(-50%);
            width: max(100vw, 100%);
            height: 36px; /* Увеличили высоту для более толстой веревки */
            
            /* Динамический отступ сверху: чем шире экран, тем ниже опускается веревка вслед за растущими флажками */
            top: calc(2rem + 2.5vw); 
            z-index: 0;
            pointer-events: none;
            filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.5));
        }

        .rope-visual .rope-outline {
            stroke: #4a2712; 
            stroke-width: 28; /* Сделали контур толще для больших экранов */
            stroke-linecap: round;
        }

        .rope-visual .rope-back {
            stroke: #6b3f1e;
            stroke-width: 20; 
            stroke-linecap: round;
        }

        .rope-visual .rope-front {
            stroke: #b7854d;
            stroke-width: 12; 
            stroke-linecap: round;
            stroke-dasharray: 14 12;
        }
    </style>
</head>
<body class="bg-gray-900 m-0 p-0 overflow-x-hidden">

    <div class="min-h-screen w-full bg-cover bg-center bg-no-repeat flex flex-col relative overflow-hidden"
         style="background-image: url('https://i.postimg.cc/JzhVhpJh/Gemini_Generated_Image_qwj2enqwj2enqwj2_2.png')">

        <div class="absolute top-0 left-0 w-full h-48 bg-gradient-to-b from-black/70 to-transparent pointer-events-none z-0"></div>

        <!-- Заголовок -->
        <div class="relative z-20 text-center pt-8 px-4 flex-shrink-0">
            <h1 class="text-4xl md:text-6xl font-extrabold text-white drop-shadow-lg mb-4" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">
                Make a sentence!
            </h1>
            <p class="text-white text-lg md:text-xl font-medium drop-shadow-md bg-black/40 inline-block px-5 py-2 rounded-full backdrop-blur-sm leading-relaxed">
                Swap the flags. (Drag or click)
            </p>
        </div>

        <!-- Контейнер с флажками и веревкой -->
        <div class="relative z-10 w-full mt-[12vh] md:mt-[16vh] overflow-x-auto overflow-y-hidden custom-scrollbar pb-10">
            <!-- Сделали контейнер w-[94vw] и max-w-[2400px], чтобы на больших экранах флажки были крупными -->
            <div class="relative min-w-[1350px] w-[94vw] max-w-[2400px] mx-auto px-6" style="padding-top: 2rem; padding-bottom: 3rem;">
                
                <!-- Веревка (смещена на y=18 для идеального центрирования внутри 36px высоты) -->
                <svg class="rope-visual" preserveAspectRatio="none">
                    <line class="rope-outline" x1="0" y1="18" x2="100%" y2="18" />
                    <line class="rope-back" x1="0" y1="18" x2="100%" y2="18" />
                    <line class="rope-front" x1="0" y1="18" x2="100%" y2="18" />
                </svg>

                <div id="flags-container" class="relative w-full flex justify-center items-start gap-2 z-10 px-4 mt-2">
                    <!-- Флажки генерируются через JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Контейнер для шариков -->
    <div id="balloons-container" class="fixed inset-0 pointer-events-none z-[100] overflow-hidden"></div>

    <!-- Модальное окно завершения игры -->
    <div id="end-game-modal" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-md transition-opacity duration-500">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl text-center">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-4xl font-bold text-green-600 mb-4">Amazing!</h2>
            <p class="text-xl text-gray-700 mb-8 font-medium">
                You have completed all sentences.
            </p>
            <button onclick="startGame()"
                    class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-8 rounded-full text-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 active:translate-y-0 w-full">
                Play again
            </button>
        </div>
    </div>

    <script>
        const SENTENCES = [
            "I am reading an interesting book.",
            "He is writing a short email.",
            "I am cleaning my room now.",
            "He is running in the park.",
            "They are singing a new song.",
            "She is wearing a pink dress.",
            "He is drawing a big house.",
            "My sister is brushing her hair.",
            "The boys are kicking a ball.",
            "We are listening to music together.",
            "My mother is making fresh salad.",
            "I am learning new words now."
        ];

        const FLAG_IMAGES = [
            "https://i.postimg.cc/RNSvgR3d/orange1.png",
            "https://i.postimg.cc/qzJp1LtX/yellow1.png",
            "https://i.postimg.cc/2VkC0wqv/pink1.png",
            "https://i.postimg.cc/KRGm0NKM/green1.png",
            "https://i.postimg.cc/VdfzKRSt/blue1.png",
            "https://i.postimg.cc/rzC8Gbp9/purple1.png"
        ];

        let flags = [];
        let selectedId = null;
        let isWon = false;
        let currentSentenceIndex = 0;
        let shuffledSentences = [];

        const flagsContainer = document.getElementById('flags-container');
        const balloonsContainer = document.getElementById('balloons-container');
        const endGameModal = document.getElementById('end-game-modal');

        function startGame() {
            // Перемешиваем предложения перед началом новой игры
            shuffledSentences = [...SENTENCES].sort(() => Math.random() - 0.5);
            currentSentenceIndex = 0;
            endGameModal.classList.add('hidden');
            initGame();
        }

        function initGame() {
            isWon = false;
            selectedId = null;

            const targetSentence = shuffledSentences[currentSentenceIndex];
            const words = targetSentence.split(' ');

            // Динамически создаем флажки под слова текущего предложения
            const initialFlags = words.map((word, idx) => ({
                id: idx + 1,
                word: word,
                imgUrl: FLAG_IMAGES[idx]
            }));

            const shuffled = [...initialFlags].sort(() => Math.random() - 0.5);
            // Проверка, чтобы случайно не выпал сразу правильный ответ
            if (shuffled.map((flag) => flag.word).join(' ') === targetSentence) {
                const temp = shuffled[0];
                shuffled[0] = shuffled[1];
                shuffled[1] = temp;
            }

            flags = shuffled;
            renderFlags();
        }

        function renderFlags() {
            flagsContainer.innerHTML = '';

            flags.forEach((flag, index) => {
                const isSelected = selectedId === flag.id;
                const flagElement = document.createElement('div');
                flagElement.draggable = !isWon;

                // Базовые классы и стили флажка
                flagElement.className = `relative flex flex-col items-center cursor-pointer transition-all duration-300 ${isSelected ? 'z-30' : 'hover:scale-105 z-20'} ${isWon ? 'cursor-default' : 'active:cursor-grabbing'}`;
                
                // Делаем флажки крупнее, используя flex: 1
                flagElement.style.flex = '1 1 0';
                flagElement.style.minWidth = '220px';
                
                // Точка трансформации: сверху по центру (чтобы качались на веревке)
                flagElement.style.transformOrigin = 'top center';
                
                flagElement.style.filter = isSelected
                    ? 'drop-shadow(0 0 25px rgba(255,255,255,0.9))'
                    : 'drop-shadow(8px 12px 20px rgba(0,0,0,0.6))';
                
                // Раскачивание и выделение
                flagElement.style.transform = isSelected
                    ? 'scale(1.15) rotate(0deg)'
                    : `rotate(${index % 2 === 0 ? '2deg' : '-2deg'})`;

                // Динамически уменьшаем шрифт для длинных слов, границы увеличены для 4K
                let fontSizeStyle = 'clamp(1.5rem, 5vw, 6.5rem)';
                if (flag.word.length > 9) {
                    fontSizeStyle = 'clamp(1rem, 2.5vw, 3.5rem)'; // Для очень длинных слов (interesting)
                } else if (flag.word.length > 6) {
                    fontSizeStyle = 'clamp(1.2rem, 3vw, 4.5rem)'; // Для длинных слов (listening, brushing)
                } else if (flag.word.length > 4) {
                    fontSizeStyle = 'clamp(1.3rem, 4vw, 5.5rem)'; // Для средних слов (reading, wearing)
                }

                let innerHTML = `
                    <div class="w-full relative">
                        <img src="${flag.imgUrl}" alt="Флажок" class="w-full h-auto block pointer-events-none" draggable="false" />
                        <div class="absolute top-[13%] md:top-[16%] w-full text-center pointer-events-none px-2 z-10 flex justify-center items-center h-[50%]">
                            <span class="text-white font-extrabold tracking-wide whitespace-nowrap text-center w-full"
                                  style="font-size: ${fontSizeStyle}; line-height: 1.1; text-shadow: 3px 3px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);">
                                ${flag.word}
                            </span>
                        </div>
                    </div>
                `;

                if (isSelected) {
                    innerHTML += `
                        <div class="absolute -top-[30%] left-1/2 transform -translate-x-1/2 text-white animate-bounce pointer-events-none drop-shadow-2xl">
                            <svg class="w-12 h-12 md:w-16 md:h-16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <polyline points="19 12 12 19 5 12"></polyline>
                            </svg>
                        </div>
                    `;
                }

                flagElement.innerHTML = innerHTML;

                // Обработчики событий
                flagElement.addEventListener('click', () => {
                    if (isWon) return;

                    if (selectedId === null) {
                        selectedId = flag.id;
                        renderFlags();
                        return;
                    }

                    if (selectedId === flag.id) {
                        selectedId = null;
                        renderFlags();
                        return;
                    }

                    swapFlagsById(selectedId, flag.id);
                    selectedId = null;
                    checkWinCondition();
                    renderFlags();
                });

                flagElement.addEventListener('dragstart', (event) => {
                    if (isWon) {
                        event.preventDefault();
                        return;
                    }
                    event.dataTransfer.setData('text/plain', index);
                    event.dataTransfer.effectAllowed = 'move';
                    selectedId = null;
                    setTimeout(() => flagElement.classList.add('opacity-50'), 0);
                });

                flagElement.addEventListener('dragover', (event) => {
                    event.preventDefault();
                });

                flagElement.addEventListener('drop', (event) => {
                    event.preventDefault();
                    if (isWon) return;

                    const fromIdx = parseInt(event.dataTransfer.getData('text/plain'), 10);
                    const toIdx = index;

                    if (fromIdx !== toIdx) {
                        const draggedFlag = flags[fromIdx];
                        flags.splice(fromIdx, 1);
                        flags.splice(toIdx, 0, draggedFlag);
                        checkWinCondition();
                    }
                });

                flagElement.addEventListener('dragend', () => {
                    flagElement.classList.remove('opacity-50');
                    renderFlags();
                });

                flagsContainer.appendChild(flagElement);
            });
        }

        function swapFlagsById(id1, id2) {
            const idx1 = flags.findIndex((flag) => flag.id === id1);
            const idx2 = flags.findIndex((flag) => flag.id === id2);
            const temp = flags[idx1];
            flags[idx1] = flags[idx2];
            flags[idx2] = temp;
        }

        function showConfetti() {
            const duration = 3000;
            const end = Date.now() + duration;
            const colors = ['#FFC700', '#FF0000', '#2E3192', '#41BBC7', '#42B649', '#E0004D'];

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.6 },
                    colors: colors,
                    zIndex: 100
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.6 },
                    colors: colors,
                    zIndex: 100
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function showBalloons() {
            const balloonCount = 25; // Количество шариков
            
            for (let i = 0; i < balloonCount; i++) {
                const balloon = document.createElement('div');
                
                // Генерируем уникальный ID для градиента, чтобы блики не ломались при множестве SVG
                const gradId = 'grad_' + Math.random().toString(36).substr(2, 9);
                
                // Новая, премиальная рисовка шарика (каплевидная форма, радиальный градиент, рефлекс, витая ниточка)
                balloon.innerHTML = `
                    <svg viewBox="0 0 100 200" style="width: 100%; height: 100%; overflow: visible;">
                        <defs>
                            <radialGradient id="${gradId}" cx="35%" cy="30%" r="65%">
                                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
                                <stop offset="15%" stop-color="#ff6b9d" />
                                <stop offset="65%" stop-color="#e6004c" />
                                <stop offset="100%" stop-color="#990033" />
                            </radialGradient>
                        </defs>
                        <!-- Красивая изогнутая ниточка -->
                        <path d="M50,118 Q70,145 45,170 T55,220" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
                        <!-- Изящный узелок у основания -->
                        <path d="M47,118 L41,126 A2,2 0 0,0 43,129 L57,129 A2,2 0 0,0 59,126 L53,118 Z" fill="#990033" />
                        <!-- Основа шарика (реалистичная каплевидная форма) -->
                        <path d="M 50 5 C 75 5, 95 25, 95 55 C 95 85, 65 110, 50 120 C 35 110, 5 85, 5 55 C 5 25, 25 5, 50 5 Z" fill="url(#${gradId})" />
                        <!-- Дополнительный мягкий боковой блик для эффекта стекла/резины -->
                        <path d="M 15 55 C 15 35, 25 15, 45 8 C 25 12, 12 35, 12 60 C 12 70, 16 80, 22 88 C 16 75, 15 65, 15 55 Z" fill="#ffffff" opacity="0.25" />
                    </svg>
                `;
                
                balloon.style.position = 'absolute';
                balloon.style.left = Math.random() * 100 + 'vw';
                balloon.style.bottom = '-20vh'; // Начинаем чуть ниже экрана
                
                // Случайный размер шарика
                const size = Math.random() * 4 + 4; // от 4rem до 8rem
                balloon.style.width = size + 'rem';
                balloon.style.height = (size * 2) + 'rem';
                
                // Изменяем базовый цвет градиента на случайный оттенок
                balloon.style.filter = `hue-rotate(${Math.random() * 360}deg) drop-shadow(0 12px 20px rgba(0,0,0,0.4))`;
                
                balloonsContainer.appendChild(balloon);

                // Плавная анимация полета с покачиванием
                const duration = Math.random() * 3000 + 4000; // от 4 до 7 секунд
                const animation = balloon.animate([
                    { transform: `translate3d(0, 0, 0) rotate(${Math.random() * 10 - 5}deg)` },
                    { transform: `translate3d(${Math.random() * 200 - 100}px, -130vh, 0) rotate(${Math.random() * 30 - 15}deg)` }
                ], {
                    duration: duration,
                    easing: 'ease-in-out',
                    fill: 'forwards'
                });

                // Удаляем шарик из DOM после завершения анимации
                animation.onfinish = () => {
                    balloon.remove();
                };
            }
        }

        function checkWinCondition() {
            const targetSentence = shuffledSentences[currentSentenceIndex];
            const currentSentence = flags.map((flag) => flag.word).join(' ');
            if (currentSentence === targetSentence) {
                isWon = true;
                
                // Чередуем эффекты в зависимости от индекса (четный -> конфетти, нечетный -> шарики)
                if (currentSentenceIndex % 2 === 0) {
                    showConfetti();
                } else {
                    showBalloons();
                }

                // Ждем 5 секунд, затем решаем: следующее предложение или конец игры
                setTimeout(() => {
                    if (currentSentenceIndex < shuffledSentences.length - 1) {
                        nextSentence();
                    } else {
                        endGameModal.classList.remove('hidden');
                    }
                }, 5000);
            }
        }

        function nextSentence() {
            currentSentenceIndex++;
            initGame();
        }

        window.addEventListener('DOMContentLoaded', startGame);
    </script>
</body>
</html>
